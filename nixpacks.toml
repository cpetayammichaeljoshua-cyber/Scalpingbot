# ──────────────────────────────────────────────────────────────────────────────
# Nixpacks build configuration (Railway fallback when no Dockerfile is present)
# Primary build method: Dockerfile (see Dockerfile in project root)
# ──────────────────────────────────────────────────────────────────────────────

[phases.setup]
nixPkgs = [
    "python311",
    "python311Packages.pip",
    "gcc",
    "gccStdenv",
    "openssl",
    "libffi",
    "zlib",
    "stdenv.cc.cc.lib",
    "curl",
]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt",
]

[start]
cmd = "python3 start_ultimate_bot.py"
