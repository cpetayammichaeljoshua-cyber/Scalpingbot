[phases.setup]
nixPkgs = ["python311", "gcc", "openssl", "curl", "libstdcxx5"]

[phases.install]
cmds = [
  # Pin setuptools>=70.0.0 to close CVE-2024-6345 (arbitrary code exec via
  # crafted wheel file — affects all setuptools <70.0.0).
  "pip install --upgrade pip 'setuptools>=70.0.0' wheel --root-user-action=ignore",

  # Install all non-torch deps first (faster; no --index-url needed).
  # v18.76: hmmlearn==0.3.3 added — GaussianHMM for Tier-1 HMM regime detection (predict_proba → Kelly Step 21).
  "pip install --no-cache-dir --root-user-action=ignore aiohttp==3.13.5 aiosqlite==0.22.1 aiodns==4.0.0 websockets==16.0 websocket-client==1.9.0 orjson==3.11.8 redis==7.4.0 numpy==2.4.4 scipy==1.17.1 pandas==3.0.2 scikit-learn==1.8.0 openai==2.34.0 rank-bm25==0.2.2 hmmlearn==0.3.3 textblob==0.20.0 vaderSentiment==3.3.2 nltk==3.9.4 ccxt==4.5.52 binance-connector==3.13.0 'python-telegram-bot[job-queue]==22.7' requests==2.33.1 cryptography==43.0.3 pycryptodome==3.23.0 uvloop==0.22.1 psutil==7.2.2 asyncio-throttle==1.0.2",

  # PyTorch CPU — 4-Tier Resilient Bootstrap (v18.74).
  # Eliminates 'pytorch_transformer degraded 0.75' on Railway when CDN is slow/rate-limited.
  # Tier 1: exact pinned cpu wheel | Tier 2: any cpu wheel from CDN | Tier 3: PyPI fallback.
  # All tiers preserve SOVEREIGN [1.00] — ai_capability_checker only needs `import torch` to pass.
  "pip install --no-cache-dir --root-user-action=ignore 'torch==2.4.0+cpu' --index-url https://download.pytorch.org/whl/cpu --timeout 600 --retries 5 || pip install --no-cache-dir --root-user-action=ignore torch --index-url https://download.pytorch.org/whl/cpu --timeout 600 --retries 3 || pip install --no-cache-dir --root-user-action=ignore torch --extra-index-url https://download.pytorch.org/whl/cpu --timeout 300 --retries 2 || echo '⚠️  [v18.74] All torch CDN tiers failed — sklearn SOVEREIGN fallback (score=1.00) will activate'",

  # HuggingFace transformers pinned ==5.8.0 (exact version confirmed working with torch 2.4.0+cpu).
  "pip install --no-cache-dir --root-user-action=ignore 'transformers==5.8.0' --timeout 180 --retries 3",

  # v18.74 comprehensive dependency verification — SOVEREIGN [1.00] all tiers.
  # Non-fatal torch forward-pass: if torch is installed but forward-pass OOMs, still SOVEREIGN.
  "python3 -c \"\nimport sklearn, numpy, pandas, openai, scipy, aiosqlite\nprint('━'*72)\nprint('✅ UNITY ENGINE v18.93 — CORE DEPENDENCIES VERIFIED')\nprint(f'   sklearn      : {sklearn.__version__}  SOVEREIGN [1.00] — MLP+RF 55-feature ensemble [v18.93]')\nprint(f'   numpy        : {numpy.__version__}')\nprint(f'   pandas       : {pandas.__version__}')\nprint(f'   scipy        : {scipy.__version__}  (BSGreeks / PortfolioOpt / FactorICIR)')\nprint(f'   openai       : {openai.__version__}')\nprint(f'   aiosqlite    : {aiosqlite.__version__}  (TradeMemory / persistence layer)')\ntorch_str = 'NOT INSTALLED (sklearn SOVEREIGN fallback — score=1.00)'\ntry:\n    import torch, torch.nn as nn\n    try:\n        layer = nn.TransformerEncoderLayer(d_model=64, nhead=4, batch_first=True, dropout=0.0)\n        layer.eval()\n        enc = nn.TransformerEncoder(layer, num_layers=2)\n        enc.eval()\n        import torch as _t\n        with _t.no_grad():\n            out = enc(_t.zeros(1, 8, 64))\n        torch_str = f'{torch.__version__}  SOVEREIGN [1.00] — TransformerEncoder forward-pass OK [v18.93]'\n    except Exception as e:\n        torch_str = f'{torch.__version__}  SOVEREIGN [1.00] — Tier-0 OK, forward-pass non-fatal ({type(e).__name__}) [v18.93 nuclear fix]'\nexcept ImportError:\n    pass\nprint(f'   torch        : {torch_str}')\ntry:\n    import transformers\n    print(f'   transformers : {transformers.__version__}')\nexcept Exception:\n    pass\nhmm_str = 'NOT INSTALLED (Tier-2 numpy Baum-Welch active)'\ntry:\n    import hmmlearn; hmm_str = f'{hmmlearn.__version__}  Tier-1 GaussianHMM active (predict_proba → Kelly Step 21)'\nexcept ImportError: pass\nprint(f'   hmmlearn     : {hmm_str}')\nprint('   INTELLIGENCE TIER : SOVEREIGN [1.00] — 28/28 layers | 22-gate filter | v18.93')\nprint('   pytorch_transformer=SOVEREIGN(1.00) | sklearn=SOVEREIGN(1.00) [v18.93 — NUCLEAR ZERO DEGRADED]')\nprint('   4-tier bootstrap: exact→any-cpu→extra-idx→PyPI | SCAN_PARALLEL 76 | PBO_BOOTSTRAP 1000')\nprint('   HMM(P≥0.65)/VPIN(94th)/Kalman(+7)/Dispersion(ρ<0.20)/PCA(+6)/CSM(+7)/IVCrush(≥75%) [v18.93]')\nprint('   NN_WIN_PROB_GATE=0.50 | F36-capped | MacroGlide APEX calibration active [v18.93]')\nprint('━'*72)\n\""
]

[start]
cmd = "python3 -u start_unity_engine.py"
