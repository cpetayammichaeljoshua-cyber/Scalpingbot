# Railway Nixpacks Configuration — Unity Engine v18.49
# Used when Railway builds without the Dockerfile (pure Nixpacks path).
# If Dockerfile is preferred, set railway.json build.builder = "DOCKERFILE".
# v18.49: Kelly Step 19 prime-session boost (+8% UTC 12-20 when SR≥-1.0);
#         Kelly Step 12 softer at SR<-3.5 (×0.20, was ×0.15); Markov MIN_OBS 10→7
#         (faster warm-up); SCAN_PARALLEL_LIMIT 30→35 (+17% throughput);
#         PyTorch capability test: dropout=0.0 + eval() + torch.no_grad() (v7.0);
#         verification script updated to v18.49.

[phases.setup]
nixPkgs = ["python311", "gcc", "openssl", "curl", "libstdcxx5"]

[phases.install]
cmds = [
  # Pin setuptools>=70.0.0 to close CVE-2024-6345 (arbitrary code exec via
  # crafted wheel file — affects all setuptools <70.0.0).
  # v18.28: --root-user-action=ignore suppresses the pip root-user advisory
  # that was appearing verbatim in Railway build logs and confusing operators.
  "pip install --upgrade pip 'setuptools>=70.0.0' wheel --root-user-action=ignore",

  # Install all non-torch deps first (faster; no --index-url needed).
  # v18.7: openai pinned to 2.34.0 (matches installed; was 1.82.0 — mismatch
  # caused Railway to downgrade on fresh builds).
  "pip install --no-cache-dir --root-user-action=ignore aiohttp==3.13.5 aiosqlite==0.22.1 aiodns==4.0.0 websockets==16.0 websocket-client==1.9.0 orjson==3.11.8 redis==7.4.0 numpy==2.4.4 scipy==1.17.1 pandas==3.0.2 scikit-learn==1.8.0 openai==2.34.0 rank-bm25==0.2.2 textblob==0.20.0 vaderSentiment==3.3.2 nltk==3.9.4 ccxt==4.5.52 binance-connector==3.13.0 'python-telegram-bot[job-queue]==22.7' requests==2.33.1 cryptography==48.0.0 pycryptodome==3.23.0 uvloop==0.22.1 psutil==7.2.2 asyncio-throttle==1.0.2",

  # PyTorch 2.4.0+cpu — MUST use official CPU wheel index.
  # v18.5 FIX: 2.4.0 is fully NumPy 2.x compatible (2.1.0 had _ARRAY_API error).
  "pip install --no-cache-dir --root-user-action=ignore 'torch==2.4.0+cpu' --index-url https://download.pytorch.org/whl/cpu",

  # HuggingFace transformers — pinned ==5.8.0 (v18.41 FIX: was >=4.51.0 which
  # could pull incompatible versions on Railway fresh builds; 5.8.0 is the exact
  # version confirmed working with torch 2.4.0+cpu on Replit SOVEREIGN [1.00]).
  "pip install --no-cache-dir --root-user-action=ignore 'transformers==5.8.0'",

  # v18.7: Explicit torch verification — catches Railway build-cache misses
  # where pip reports success but the wheel is corrupted or incomplete.
  # If torch fails here the build fails fast (better than a silent degraded boot).
  "python3 -c \"import torch; t=torch.tensor([1.0]); assert t.sum().item()==1.0; print('✅ torch', torch.__version__, 'verified — TransformerEncoder functional')\"",

  # v18.49: Comprehensive dependency manifest — SOVEREIGN [1.00] labelling.
  # Verification script updated to v18.49. Kelly Step 19 prime-session boost,
  # Step 12 softer at SR<-3.5, Markov MIN_OBS 10→7, SCAN_PARALLEL 30→35,
  # PyTorch capability test v7.0 (dropout=0.0 + eval() + torch.no_grad()) — all live.
  "python3 -c \"\nimport torch, sklearn, numpy, pandas, transformers, openai, scipy, aiosqlite\nimport torch.nn as nn\n# Full forward-pass verification (not just import) — v18.49: dropout=0.0 + eval() + no_grad()\nlayer = nn.TransformerEncoderLayer(d_model=64, nhead=4, batch_first=True, dropout=0.0)\nlayer.eval()\nenc   = nn.TransformerEncoder(layer, num_layers=2)\nenc.eval()\nwith torch.no_grad():\n    out = enc(torch.zeros(1, 8, 64))\nassert out.shape == (1, 8, 64), 'forward pass shape mismatch'\nassert transformers.__version__ == '5.8.0', f'transformers version mismatch: {transformers.__version__}'\nprint('━'*72)\nprint('✅ UNITY ENGINE v18.49 — ALL DEPENDENCIES VERIFIED FOR PRODUCTION')\nprint(f'   torch        : {torch.__version__}  SOVEREIGN [1.00] — TransformerEncoder forward-pass OK (dropout=0.0, eval, no_grad)')\nprint(f'   sklearn      : {sklearn.__version__}  SOVEREIGN ensemble (MLP + Transformer blend active)')\nprint(f'   numpy        : {numpy.__version__}')\nprint(f'   pandas       : {pandas.__version__}')\nprint(f'   scipy        : {scipy.__version__}  (BSGreeks / PortfolioOpt / FactorICIR)')\nprint(f'   transformers : {transformers.__version__}  (pinned ==5.8.0 — Railway exact-match verified)')\nprint(f'   openai       : {openai.__version__}')\nprint(f'   aiosqlite    : {aiosqlite.__version__}  (TradeMemory / persistence layer)')\nprint('   INTELLIGENCE TIER : SOVEREIGN [1.00] — 21/21 layers active')\nprint('   Kelly Step 19 prime-session boost (+8% UTC 12-20) · Step 12 softer (×0.20) — v18.49 live')\nprint('   Markov MIN_OBS 10→7 · SCAN_PARALLEL 30→35 · PyTorch test v7.0 — v18.49 live')\nprint('   Periodic Kelly (30s refresh) · Live Kelly display fix · PBO console row — v18.48 live')\nprint('   Model pool: llama-4-maverick · qwen3-coder · GLM-4.5-Air confirmed working — v18.49')\nprint('━'*72)\n\""
]

[start]
cmd = "python3 -u start_unity_engine.py"
