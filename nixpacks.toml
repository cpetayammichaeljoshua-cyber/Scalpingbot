#   • Qwen3-235B-A22B re-added to SmartLLMRouter SIMPLE+REASONING pools (corrected OpenRouter slug).
#   • Layer count: 21→28; gate count: 15→22; subsystem count: 16→23.
#   • All 7 new modules: no new PyPI dependencies — numpy/scipy already in requirements.txt.
#   • VERSION bumped 18.71→18.72.
# v18.71 changes:
#   • G_BLK pre-warm cooldown: 300→150s (62 blocked symbols rejoin pool 2.5min earlier).
#   • EV-fail level-3 suppress: 1800→1200s; Asian-session cap: 900→600s.
#   • EV-fail escalate threshold: 6→7 consecutive fails before level-3 fires.
#   • NEARUSDT removed from _FILTER_PROTECTED_SYMBOLS (WR=8%/25 trades → correctly G_BLK).
#   • SIGNAL_INTERVAL_MIN: 300→240s (faster per-symbol re-entry after candle close).
#   • AI gate bypass consensus threshold: 0.88→0.86 (86% = 8+/10 swarm agents, near-unanimous).
#   • VERSION bumped 18.70→18.71.
# v18.70 changes:
#   • EV_MIN_THRESHOLD: 22→20bps (BNBUSDT 0.2388% now passes crisis-tier dynamic floor).
#   • IRONS_MIN_WR_BELOW30: 62→60; IRONS_MIN_WR_30_45: 59→57 (recover ~8% over-filtered signals).
#   • DYNAMIC_SLEEP env-injection bug fixed: HIGH_Q 8→10, NORMAL 12→25 (align with CYCLE_SLEEP_MIN/MAX).
#   • Delisted symbols RNDRUSDT/MATICUSDT/MKRUSDT purged → SAGAUSDT/ZECUSDT/ARUSDT.
